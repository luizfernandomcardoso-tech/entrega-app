<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Entrega - Oficial</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            padding: 20px;
            margin: 0;
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            background: #1c1c1e;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .camera-btn {
            background-color: #2c2c2e;
            border: 2px dashed #48484a;
            border-radius: 12px;
            width: 100%;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #25D366;
            font-weight: bold;
            position: relative;
        }

        .camera-input {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        #previewImg {
            width: 100%;
            border-radius: 8px;
            display: none;
            margin-top: 10px;
            border: 2px solid #25D366;
        }

        /* Botão Urgente */
        .btn-urgent {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #48484a;
            background: #2c2c2e;
            color: #8e8e93;
            font-weight: bold;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .btn-urgent.active {
            background: #ff453a;
            color: white;
            border-color: #ff453a;
        }

        label { font-size: 11px; color: #8e8e93; display: block; margin-top: 10px; text-transform: uppercase; }
        
        input, textarea {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            margin-top: 5px;
        }

        .btn-primary {
            background-color: #007aff;
            color: white;
            font-weight: bold;
            padding: 18px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
            cursor: pointer;
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            font-weight: bold;
            padding: 18px;
            border-radius: 10px;
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        #statusMsg { text-align: center; font-size: 14px; margin-top: 10px; color: #ffd60a; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div class="camera-btn">
            <span style="font-size: 30px;">📷</span>
            <span>Tocar para tirar foto</span>
            <input type="file" id="cameraInput" class="camera-input" accept="image/*" capture="camera">
        </div>
        <p id="statusMsg">Processando imagem...</p>
        <img id="previewImg">
        <button onclick="location.reload()" style="background:none; border:none; color:#ff453a; margin-top:10px; width:100%; display:none;" id="btnReset">❌ Limpar / Novo</button>
    </div>

    <!-- Botão Urgente -->
    <button type="button" id="urgentBtn" class="btn-urgent" onclick="toggleUrgent()">
        ⚠️ ENTREGA NORMAL (CLIQUE PARA URGENTE)
    </button>

    <div class="card">
        <label>Nome do Cliente *</label>
        <input type="text" id="nome">
        
        <label>Telefone</label>
        <input type="tel" id="telefone">

        <label>Quem Recebe</label>
        <input type="text" id="recebedor">

        <label>Rua *</label>
        <input type="text" id="rua">

        <div style="display:flex; gap:10px;">
            <div style="flex:1"><label>Número *</label><input type="text" id="numero"></div>
            <div style="flex:2"><label>Bairro *</label><input type="text" id="bairro"></div>
        </div>

        <label>Horário *</label>
        <input type="text" id="horario" placeholder="Ex: Antes das 18h">

        <label>Forma de Pagamento</label>
        <input type="text" id="pagamento" placeholder="Pix, Cartão, Dinheiro">

        <label>Observações</label>
        <textarea id="obs" rows="2"></textarea>
    </div>

    <div class="btn-primary" onclick="gerarEtiqueta()">
        GERAR ETIQUETA
    </div>

    <div id="resultArea" class="card" style="display:none; margin-top:20px;">
        <h3 style="text-align:center; margin:0 0 10px 0;">Pronto!</h3>
        <canvas id="finalCanvas" style="width:100%; border-radius:8px;"></canvas>
        
        <div class="btn-whatsapp" onclick="compartilhar()">
            📤 ENVIAR NO WHATSAPP
        </div>
        <p style="text-align:center; color:#666; font-size:12px; margin-top:10px;">
            Se não abrir o WhatsApp, tire um print da tela.
        </p>
    </div>

    <script>
        const cameraInput = document.getElementById('cameraInput');
        const previewImg = document.getElementById('previewImg');
        const statusMsg = document.getElementById('statusMsg');
        const canvas = document.getElementById('finalCanvas');
        const ctx = canvas.getContext('2d');
        const resultArea = document.getElementById('resultArea');
        const btnReset = document.getElementById('btnReset');
        
        let imgProcessada = null;
        let isUrgente = false;

        function toggleUrgent() {
            isUrgente = !isUrgente;
            const btn = document.getElementById('urgentBtn');
            btn.classList.toggle('active');
            btn.innerText = isUrgente ? "🚨 ENTREGA URGENTE SELECIONADA" : "⚠️ ENTREGA NORMAL (CLIQUE PARA URGENTE)";
        }

        cameraInput.addEventListener('change', function(e) {
            if (e.target.files.length === 0) return;
            statusMsg.style.display = 'block';
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(event) {
                const tempImg = new Image();
                tempImg.onload = function() {
                    const MAX_SIZE = 1000;
                    let w = tempImg.width;
                    let h = tempImg.height;
                    if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } } 
                    else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }

                    const tCanvas = document.createElement('canvas');
                    tCanvas.width = w; tCanvas.height = h;
                    tCanvas.getContext('2d').drawImage(tempImg, 0, 0, w, h);

                    imgProcessada = new Image();
                    imgProcessada.src = tCanvas.toDataURL('image/jpeg', 0.8);
                    imgProcessada.onload = function() {
                        previewImg.src = imgProcessada.src;
                        previewImg.style.display = 'block';
                        statusMsg.style.display = 'none';
                        btnReset.style.display = 'block';
                    }
                };
                tempImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function gerarEtiqueta() {
            if (!imgProcessada) return alert("Tire a foto da notinha primeiro!");

            const dados = {
                nome: document.getElementById('nome').value,
                tel: document.getElementById('telefone').value,
                rec: document.getElementById('recebedor').value,
                rua: document.getElementById('rua').value,
                num: document.getElementById('numero').value,
                bai: document.getElementById('bairro').value,
                hor: document.getElementById('horario').value,
                pag: document.getElementById('pagamento').value,
                obs: document.getElementById('obs').value
            };

            if (!dados.nome || !dados.rua || !dados.num || !dados.bai || !dados.hor) {
                return alert("Preencha os campos obrigatórios (*)");
            }

            const largura = 800;
            const escala = largura / imgProcessada.width;
            const alturaFoto = imgProcessada.height * escala;
            const alturaRodape = 680;

            canvas.width = largura;
            canvas.height = alturaFoto + alturaRodape;

            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, largura, canvas.height);
            ctx.drawImage(imgProcessada, 0, 0, largura, alturaFoto);

            // COR DO RODAPÉ (PRETO OU VERMELHO)
            ctx.fillStyle = isUrgente ? "#ff0000" : "#1c1c1e";
            ctx.fillRect(0, alturaFoto, largura, alturaRodape);

            ctx.fillStyle = "white";
            ctx.textAlign = "left";
            const pad = 40;
            let y = alturaFoto + 70;

            if(isUrgente) {
                ctx.font = "bold 45px sans-serif";
                ctx.fillText("🚨 ENTREGA URGENTE 🚨", pad, y);
                y += 80;
            }

            ctx.font = "bold 38px sans-serif";
            ctx.fillText("CLIENTE: " + dados.nome.toUpperCase(), pad, y);
            y += 55;

            if(dados.tel) { ctx.fillText("TEL: " + dados.tel, pad, y); y += 55; }
            if(dados.rec) { ctx.fillText("RECEBER: " + dados.rec.toUpperCase(), pad, y); y += 55; }

            ctx.font = "bold 34px sans-serif";
            ctx.fillText("📍 " + dados.rua.toUpperCase() + ", " + dados.num, pad, y);
            y += 50;
            ctx.fillText("   BAIRRO: " + dados.bai.toUpperCase(), pad, y);
            y += 80;

            ctx.fillStyle = isUrgente ? "yellow" : "#25D366";
            ctx.font = "bold 42px sans-serif";
            ctx.fillText("⏰ HORÁRIO: " + dados.hor.toUpperCase(), pad, y);
            y += 70;

            ctx.fillStyle = "white";
            ctx.font = "bold 36px sans-serif";
            ctx.fillText("💳 PAGTO: " + dados.pag.toUpperCase(), pad, y);
            y += 70;

            if(dados.obs) {
                ctx.font = "italic 30px sans-serif";
                ctx.fillText("Obs: " + dados.obs, pad, y);
            }

            resultArea.style.display = "block";
            resultArea.scrollIntoView({ behavior: 'smooth' });
        }

        function compartilhar() {
            canvas.toBlob(blob => {
                const file = new File([blob], "entrega.jpg", { type: "image/jpeg" });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({ files: [file], title: 'Entrega' });
                } else {
                    alert("Seu navegador não suporta envio direto. Tire um print ou segure na imagem para salvar.");
                }
            }, 'image/jpeg', 0.9);
        }
    </script>
</body>
</html>
