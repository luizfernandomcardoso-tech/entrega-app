<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Entrega - Final</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            padding: 15px;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            background: #1c1c1e;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .camera-box {
            background-color: #2c2c2e;
            border: 2px dashed #48484a;
            border-radius: 12px;
            height: 100px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #25D366;
            font-weight: bold;
        }

        .camera-input {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            z-index: 2;
        }

        #previewImg {
            width: 100%;
            border-radius: 10px;
            display: none;
            margin-top: 10px;
        }

        .btn-urgent {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #48484a;
            background: #2c2c2e;
            color: #8e8e93;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .btn-urgent.active {
            background: #ff453a;
            color: white;
            border-color: #ff453a;
        }

        label { color: #8e8e93; font-size: 11px; display: block; margin-top: 10px; text-transform: uppercase; }
        
        input, textarea {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            margin-top: 5px;
        }

        .btn-main {
            width: 100%;
            background: #007aff;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
        }

        /* ESTILO DO BOTÃO WHATSAPP */
        .btn-whatsapp {
            width: 100%;
            background-color: #25D366 !important;
            color: white !important;
            border: none;
            padding: 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        #resultArea { display: none; text-align: center; }
        #finalImg { width: 100%; border-radius: 12px; margin: 15px 0; border: 2px solid #333; }
        
        .tip { background: #333; padding: 10px; border-radius: 8px; font-size: 13px; color: #ccc; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="camera-box">
            <span style="font-size:30px">📷</span>
            <span>Tirar Foto da Notinha</span>
            <input type="file" id="camInp" class="camera-input" accept="image/*" capture="camera">
        </div>
        <img id="previewImg">
    </div>

    <button type="button" id="urgentBtn" class="btn-urgent" onclick="toggleUrgent()">
        ⚠️ ENTREGA NORMAL
    </button>

    <div class="card">
        <label>Nome do Cliente *</label>
        <input type="text" id="nome">
        <label>Telefone</label>
        <input type="tel" id="tel">
        <label>Quem Recebe</label>
        <input type="text" id="recebedor">
        <label>Rua *</label>
        <input type="text" id="rua">
        <div style="display:flex; gap:10px;">
            <div style="flex:1"><label>Número *</label><input type="text" id="num"></div>
            <div style="flex:2"><label>Bairro *</label><input type="text" id="bairro"></div>
        </div>
        <label>Horário de Entrega *</label>
        <input type="text" id="hora">
        <label>Forma de Pagamento</label>
        <input type="text" id="pagamento">
        <label>Observações</label>
        <textarea id="obs" rows="2"></textarea>
    </div>

    <button class="btn-main" onclick="gerar()">GERAR ETIQUETA FINAL</button>

    <!-- ÁREA DE RESULTADO -->
    <div id="resultArea" class="card">
        <h3 style="margin:0">Etiqueta Pronta!</h3>
        
        <canvas id="canvas" style="display:none"></canvas>
        <img id="finalImg">
        
        <!-- BOTÃO DE WHATSAPP -->
        <button type="button" class="btn-whatsapp" onclick="enviarWhats()">
            <span style="font-size:24px">📲</span> ENVIAR NO WHATSAPP
        </button>

        <div class="tip">👆 <b>Toque no botão acima</b> para enviar ou segure na imagem para salvar.</div>
        
        <button onclick="location.reload()" style="background:none; border:none; color:#ff453a; margin-top:20px; font-weight:bold; width:100%;">❌ LIMPAR E NOVO</button>
    </div>

    <script>
        let urgente = false;
        let fotoData = null;

        function toggleUrgent() {
            urgente = !urgente;
            const btn = document.getElementById('urgentBtn');
            btn.classList.toggle('active');
            btn.innerText = urgente ? "🚨 URGENTE SELECIONADO" : "⚠️ ENTREGA NORMAL";
        }

        document.getElementById('camInp').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const cv = document.createElement('canvas');
                    const ctx = cv.getContext('2d');
                    cv.width = 800;
                    cv.height = (img.height * 800) / img.width;
                    ctx.drawImage(img, 0, 0, 800, cv.height);
                    fotoData = cv.toDataURL('image/jpeg', 0.8);
                    document.getElementById('previewImg').src = fotoData;
                    document.getElementById('previewImg').style.display = 'block';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        function gerar() {
            if(!fotoData) return alert("⚠️ Tire a foto primeiro!");
            
            const cv = document.getElementById('canvas');
            const ctx = cv.getContext('2d');
            const imgN = new Image();
            
            imgN.onload = function() {
                const hRodape = 680;
                cv.width = 800;
                cv.height = imgN.height + hRodape;

                ctx.fillStyle = "white";
                ctx.fillRect(0,0,800,cv.height);
                ctx.drawImage(imgN, 0, 0);

                ctx.fillStyle = urgente ? "#ff0000" : "#1c1c1e";
                ctx.fillRect(0, imgN.height, 800, hRodape);

                ctx.fillStyle = "white";
                ctx.textAlign = "left";
                let y = imgN.height + 60;

                if(urgente) {
                    ctx.font = "bold 45px sans-serif";
                    ctx.fillText("🚨 ENTREGA URGENTE 🚨", 40, y);
                    y += 75;
                }

                ctx.font = "bold 35px sans-serif";
                ctx.fillText("CLIENTE: " + document.getElementById('nome').value.toUpperCase(), 40, y);
                y += 50;
                ctx.fillText("TEL: " + document.getElementById('tel').value, 40, y);
                y += 50;
                ctx.fillText("RECEBER: " + document.getElementById('recebedor').value.toUpperCase(), 40, y);
                y += 55;
                ctx.font = "bold 32px sans-serif";
                ctx.fillText("RUA: " + document.getElementById('rua').value.toUpperCase() + ", " + document.getElementById('num').value, 40, y);
                y += 45;
                ctx.fillText("BAIRRO: " + document.getElementById('bairro').value.toUpperCase(), 40, y);
                y += 75;

                ctx.fillStyle = urgente ? "yellow" : "#25D366";
                ctx.font = "bold 42px sans-serif";
                ctx.fillText("⏰ HORÁRIO: " + document.getElementById('hora').value.toUpperCase(), 40, y);
                y += 65;

                ctx.fillStyle = "white";
                ctx.font = "bold 35px sans-serif";
                ctx.fillText("💳 PAGTO: " + document.getElementById('pagamento').value.toUpperCase(), 40, y);
                y += 65;
                ctx.font = "italic 28px sans-serif";
                ctx.fillText("Obs: " + document.getElementById('obs').value, 40, y);

                document.getElementById('finalImg').src = cv.toDataURL('image/jpeg', 0.9);
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('resultArea').scrollIntoView({behavior: "smooth"});
            };
            imgN.src = fotoData;
        }

        async function enviarWhats() {
            const canvas = document.getElementById('canvas');
            canvas.toBlob(async (blob) => {
                const file = new File([blob], 'entrega.jpg', { type: 'image/jpeg' });
                if (navigator.share) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: 'Etiqueta',
                            text: 'Dados da Entrega'
                        });
                    } catch (err) { console.log(err); }
                } else {
                    alert("Seu navegador não suporta compartilhamento direto. Segure na imagem para salvar.");
                }
            }, 'image/jpeg', 0.9);
        }
    </script>
</body>
</html>
